<!DOCTYPE html>
<html lang="tr">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      line-height: 1.7;
    }

    header {

      padding: 1.2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .logo span { color: #f0c040; }

    nav a {
      text-decoration: none;
      color: #cbd5e1;
      margin-left: 2rem;
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: color 0.2s;
    }

    nav a:hover { color: #f0c040; }

    .hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      color: white;
      text-align: center;
      padding: 5rem 2rem;
    }

    .hero-tag {
      display: inline-block;
      background: rgba(240, 192, 64, 0.15);
      color: #f0c040;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0.4rem 1.2rem;
      border-radius: 20px;
      border: 1px solid rgba(240, 192, 64, 0.3);
      margin-bottom: 1.5rem;
    }

    .hero h2 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      line-height: 1.3;
      color: #ffffff;
      margin-bottom: 1.2rem;
    }

    .hero p {
      font-size: 1.1rem;
      color: #94a3b8;
      font-weight: 300;
      max-width: 500px;
      margin: 0 auto;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 4rem 2rem 5rem;
    }

    .bolum-baslik {
      font-size: 0.75rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 1.5rem;
    }

    .yazi-karti {
      border: 1px solid #e8edf2;
      border-radius: 14px;
      padding: 2.5rem;
      margin-bottom: 1.5rem;
      transition: box-shadow 0.25s, transform 0.25s;
      background: #fff;
    }

    .yazi-karti:hover {
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.1);
      transform: translateY(-2px);
    }

    .yazi-karti .kategori {
      font-size: 0.72rem;
      font-weight: 600;
      color: #f0c040;
      background: #0f172a;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 1rem;
    }

    .yazi-karti h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: #0f172a;
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    .yazi-karti p {
      color: #4b5563;
      font-size: 0.97rem;
      margin-bottom: 0.8rem;
    }

    .uyari {
      font-size: 0.8rem;
      color: #b0b8c4;
      font-style: italic;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #f0f4f8;
    }

    footer {
      background: #0f172a;
      text-align: center;
      padding: 2rem;
      font-size: 0.85rem;
      color: #475569;
    }

    footer span { color: #f0c040; }
  </style>
</head>

    </nav>

  </div>
